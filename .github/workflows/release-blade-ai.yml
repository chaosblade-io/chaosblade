# Migration-ready release workflow for placement at
# ``chaosblade-io/chaosblade/.github/workflows/release-blade-ai.yml``
# AFTER moving fault-drill-agent into ``chaosblade/blade-ai/``.
#
# Differences vs the in-repo ``.github/workflows/release.yml``:
#   * Tag namespace switched from ``v*`` to ``blade-ai-v*`` so the
#     ChaosBlade tool's own ``v*`` tags don't accidentally fire this
#     pipeline.
#   * ``paths`` filter restricts triggers to changes inside
#     ``blade-ai/**`` — chaosblade-only commits don't waste CI minutes
#     here.
#   * Every project path is prefixed with ``blade-ai/`` so the workflow
#     resolves files from the chaosblade repo root.
#   * Working directories for npm / build / publish steps moved to
#     ``blade-ai/`` and ``blade-ai/tui/``.
#   * Docker volume mount targets ``$PWD/blade-ai`` so the container's
#     ``/src`` cwd matches what blade-ai.spec expects.

name: Release blade-ai

on:
  push:
    tags: ['blade-ai-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to release (e.g. blade-ai-v0.3.0-alpha.1; must match all 4 version files)'
        required: true
        default: ''

permissions:
  contents: write

env:
  CHAOSBLADE_VERSION: '1.8.0'

jobs:
  # ── Verify all version files agree with the release tag ────────────────
  verify-versions:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
      tag: ${{ steps.derive.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Derive tag/version from inputs or ref
        id: derive
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            TAG="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Strip the ``blade-ai-v`` prefix to recover the bare semver
          # used in pyproject / package.json / __version__.
          VERSION="${TAG#blade-ai-v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag: $TAG · Version: $VERSION"

      - name: Verify blade-ai/pyproject.toml
        shell: bash
        run: |
          PKG="$(grep -E '^version = ' blade-ai/pyproject.toml | head -1 | sed -E 's/^version = "(.*)"/\1/')"
          if [ "${{ steps.derive.outputs.version }}" != "$PKG" ]; then
            echo "::error::blade-ai/pyproject.toml version ($PKG) ≠ tag ${{ steps.derive.outputs.tag }}"
            exit 1
          fi
          echo "✓ blade-ai/pyproject.toml matches"

      - name: Verify blade-ai/tui/package.json
        shell: bash
        run: |
          PKG="$(node -p 'require("./blade-ai/tui/package.json").version')"
          if [ "${{ steps.derive.outputs.version }}" != "$PKG" ]; then
            echo "::error::blade-ai/tui/package.json version ($PKG) ≠ tag ${{ steps.derive.outputs.tag }}"
            exit 1
          fi
          echo "✓ blade-ai/tui/package.json matches"

      - name: Verify blade-ai/src/chaos_agent/__init__.py
        shell: bash
        run: |
          PKG="$(grep -E '^__version__ = ' blade-ai/src/chaos_agent/__init__.py | head -1 | sed -E 's/^__version__ = "(.*)"/\1/')"
          if [ "${{ steps.derive.outputs.version }}" != "$PKG" ]; then
            echo "::error::blade-ai/src/chaos_agent/__init__.py __version__ ($PKG) ≠ tag ${{ steps.derive.outputs.tag }}"
            exit 1
          fi
          echo "✓ blade-ai/src/chaos_agent/__init__.py matches"

  # ── Build the TS TUI bundle once, share via artifact ───────────────────
  build-tui:
    needs: verify-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: blade-ai/tui/package-lock.json
      - name: Install dependencies
        working-directory: blade-ai/tui
        run: |
          # GitHub-hosted Linux runners hit npm's "Exit handler never
          # called!" bug when patch-package runs in postinstall. Two-part
          # workaround:
          #
          # 1) Pin to npm 10.9.2 — Node 22's bundled npm 11 is more
          #    flaky here. The downgrade itself can trigger the same
          #    exit-handler bug right after the package swap, so `|| true`
          #    lets us keep going since the new npm is already on PATH.
          # 2) Install with --ignore-scripts so postinstall (which runs
          #    patch-package) is NOT executed inside npm. Then apply
          #    patches by invoking the patch-package binary directly,
          #    bypassing npm's lifecycle / exit handler entirely.
          #
          # Without (2) the job hangs forever after npm prints
          # "Exit handler never called!" and never returns to the shell.
          npm install -g npm@10.9.2 || true
          npm --version
          npm ci --ignore-scripts --prefer-offline --no-audit --no-fund \
            || npm install --ignore-scripts --no-audit --no-fund
          # Apply patches/ explicitly (postinstall was skipped above).
          # Direct binary call avoids `npx`'s extra fetch / exit handler.
          ./node_modules/.bin/patch-package
      - name: Typecheck
        working-directory: blade-ai/tui
        run: npm run typecheck
      - name: Build bundle
        working-directory: blade-ai/tui
        run: npm run build
      - name: Vitest
        working-directory: blade-ai/tui
        run: npm test
      # TODO(blade-ai): re-enable once smoke-slash.mjs is debugged. Hangs
      # silently on GitHub Linux runners after smoke-i18n.mjs prints
      # success — likely an unguarded fetch / tsImport side-effect
      # that depends on a host-locale or DNS condition we don't have
      # in CI. Vitest above already covers reducer + commands surface;
      # losing the smoke is acceptable in the short term.
      # - name: Headless smokes (server-less subset)
      #   working-directory: blade-ai/tui
      #   run: |
      #     node scripts/smoke-i18n.mjs
      #     node scripts/smoke-slash.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: tui-bundle
          # Both cli.js (the bundle) and package.json (the {"type":"module"}
          # marker that prevents Node 22's MODULE_TYPELESS_PACKAGE_JSON
          # warning) are required by blade-ai.spec's datas list. Listing
          # them explicitly (rather than uploading the whole dist/ dir)
          # keeps the artifact small — tsup also drops a 6.5 MB cli.js.map
          # we don't need to ship into the PyInstaller bundle.
          path: |
            blade-ai/tui/dist/cli.js
            blade-ai/tui/dist/package.json
          retention-days: 7
          if-no-files-found: error

  # ── Build native binaries on each platform ──────────────────────────────
  build:
    needs: [verify-versions, build-tui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            target: linux_amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            target: linux_arm64
            runner: ubuntu-24.04-arm
            use_docker: true
          - os: darwin
            arch: amd64
            target: darwin_amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            target: darwin_arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # Pull the TS bundle into ``blade-ai/tui/dist/cli.js`` BEFORE
      # pyinstaller runs.
      - uses: actions/download-artifact@v4
        with:
          name: tui-bundle
          path: blade-ai/tui/dist
      - name: Verify TS bundle in place
        shell: bash
        run: ls -la blade-ai/tui/dist/cli.js

      - name: Download ChaosBlade tool
        shell: bash
        run: |
          set -euo pipefail
          VER="${CHAOSBLADE_VERSION}"
          ARCH="${{ matrix.target }}"
          URL="https://github.com/chaosblade-io/chaosblade/releases/download/v${VER}/chaosblade-${VER}-${ARCH}.tar.gz"
          echo "Fetching $URL"
          curl -fSL --retry 3 --retry-delay 2 -o /tmp/chaosblade.tar.gz "$URL"
          rm -rf blade-ai/vendor/chaosblade
          mkdir -p blade-ai/vendor
          tar -xzf /tmp/chaosblade.tar.gz -C /tmp
          mv "/tmp/chaosblade-${VER}-${ARCH}" blade-ai/vendor/chaosblade
          echo "blade-ai/vendor/chaosblade contents:"
          ls -la blade-ai/vendor/chaosblade
          file blade-ai/vendor/chaosblade/blade || true

      # ── Linux/arm64: build inside manylinux docker (glibc 2.17 baseline) ─
      - name: Build with PyInstaller (manylinux Docker)
        if: matrix.use_docker
        shell: bash
        run: |
          set -euo pipefail
          # Pick the manylinux2014 image that matches the target arch.
          # Image base is hard-coded here (instead of in the matrix) to
          # keep the matrix entries lean — the mapping never changes.
          case "${{ matrix.target }}" in
            linux_amd64) IMG=quay.io/pypa/manylinux2014_x86_64 ;;
            linux_arm64) IMG=quay.io/pypa/manylinux2014_aarch64 ;;
            *) echo "::error::no manylinux image for target ${{ matrix.target }}"; exit 1 ;;
          esac
          docker run --rm \
            -v "$PWD/blade-ai:/src" \
            -w /src \
            "$IMG" \
            bash -c '
              set -euo pipefail
              export PATH=/opt/python/cp311-cp311/bin:$PATH
              python --version

              # tiktoken does not publish a manylinux2014_aarch64 wheel
              # on PyPI, so pip falls back to building from sdist which
              # requires a Rust toolchain. The manylinux2014 image does
              # not ship with cargo, so we install rustup minimal into
              # the throw-away container before pip install. The check
              # is portable across both arches in case a future package
              # tightens the same constraint on x86_64.
              if ! command -v cargo >/dev/null 2>&1; then
                curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs \
                  | sh -s -- -y --default-toolchain stable --profile minimal
                export PATH="$HOME/.cargo/bin:$PATH"
              fi
              cargo --version

              python -m pip install --upgrade pip
              python -m pip install -e ".[dev]"
              python -m PyInstaller blade-ai.spec --noconfirm
            '

      # ── Native build: linux/amd64 + darwin/{amd64,arm64} ────────────
      - name: Set up Python
        if: '!matrix.use_docker'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: blade-ai/pyproject.toml

      - name: Install project + dev tools (native)
        if: '!matrix.use_docker'
        shell: bash
        working-directory: blade-ai
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build with PyInstaller (native)
        if: '!matrix.use_docker'
        shell: bash
        working-directory: blade-ai
        run: |
          set -euo pipefail
          # macOS spec reads BLADE_TARGET_ARCH to pin the PyInstaller
          # bootloader to the right slice (universal2 wheels). Linux
          # native ignores it (host arch == target arch on linux/amd64).
          # Note: darwin/amd64 builds on macos-latest (arm64 host) →
          # PyInstaller does the universal2 cross-slice; native deps
          # must ship universal2 wheels for this to succeed.
          case "${{ matrix.os }}-${{ matrix.arch }}" in
            darwin-amd64) export BLADE_TARGET_ARCH=x86_64 ;;
            darwin-arm64) export BLADE_TARGET_ARCH=arm64 ;;
          esac
          python -m PyInstaller blade-ai.spec --noconfirm

      # Ad-hoc codesign so the unsigned bootloader doesn't get killed
      # by Gatekeeper when users curl-bash install on macOS.
      - name: Ad-hoc codesign (macOS)
        if: matrix.os == 'darwin'
        shell: bash
        run: |
          codesign --force --deep --sign - blade-ai/dist/blade-ai/blade-ai

      - name: Package Unix archive
        shell: bash
        run: |
          PLATFORM="${{ matrix.os }}-${{ matrix.arch }}"
          tar -czf "blade-ai-${PLATFORM}.tar.gz" -C blade-ai/dist blade-ai

      - uses: actions/upload-artifact@v4
        with:
          name: blade-ai-${{ matrix.os }}-${{ matrix.arch }}
          path: blade-ai-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 1

  # ── Create GitHub Release with all artifacts + checksums ───────────────
  release:
    needs: [verify-versions, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          find . -type f -name "*.tar.gz" -exec mv {} . \;
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-versions.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          body: |
            ## blade-ai ${{ needs.verify-versions.outputs.tag }}

            Bundles ChaosBlade tool v${{ env.CHAOSBLADE_VERSION }} for Linux / macOS.

            ### Installation

            **macOS / Linux:**
            ```bash
            curl -fsSL https://chaosblade.io/install-agent.sh | bash
            ```

            **Specify version:**
            ```bash
            curl -fsSL https://chaosblade.io/install-agent.sh | bash -s -- --version ${{ needs.verify-versions.outputs.version }}
            ```

            Verify the download via `checksums.txt` before extracting.
